name: CI Validation

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Validate Backend Despachos
        working-directory: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        run: mvn clean compile

      - name: Validate Backend Ventas
        working-directory: ./back-Ventas_SpringBoot/Springboot-API-REST
        run: mvn clean compile

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './front_despacho/package-lock.json'

      - name: Validate Frontend
        working-directory: ./front_despacho
        run: |
          npm ci
          npm run build
